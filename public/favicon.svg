<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#1a3a52" rx="40"/>
  
  <!-- Document/Resume shape -->
  <rect x="50" y="40" width="100" height="120" fill="#ffffff" rx="4"/>
  
  <!-- Document lines -->
  <line x1="65" y1="60" x2="135" y2="60" stroke="#1a3a52" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="80" x2="135" y2="80" stroke="#1a3a52" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="95" x2="135" y2="95" stroke="#1a3a52" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="110" x2="110" y2="110" stroke="#1a3a52" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="125" x2="135" y2="125" stroke="#1a3a52" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Sparkle 1 (top-left) -->
  <g transform="translate(30, 35)">
    <polygon points="0,-8 2,-2 8,-1 3,3 4,9 0,5 -4,9 -3,3 -8,-1 -2,-2" fill="#fbbf24"/>
  </g>
  
  <!-- Sparkle 2 (top-right) -->
  <g transform="translate(170, 30)">
    <polygon points="0,-6 1.5,-1.5 6,-1 2.5,2 3,7 0,3.5 -3,7 -2.5,2 -6,-1 -1.5,-1.5" fill="#fbbf24"/>
  </g>
  
  <!-- Sparkle 3 (bottom-right) -->
  <g transform="translate(155, 160)">
    <polygon points="0,-5 1,-1 5,0 2,2 2.5,6 0,3 -2.5,6 -2,2 -5,0 -1,-1" fill="#fbbf24"/>
  </g>
</svg>